<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' https: data: blob:; connect-src 'self' https:">
  <title>Dota2skins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=block" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
  </div>

  <div id="app">
    <!-- Custom title bar -->
    <header id="titlebar">
      <div class="tb-brand">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2l7 4v8l-7 8-7-8V6z"/><path d="M12 8v6"/><path d="M9 11h6"/></svg>
        <span class="tb-title">Dota2skins</span>
        <span class="tb-sub">Dota 2</span>
      </div>

      <div class="tb-spacer"></div>

      <div class="tb-search">
        <span class="ms" aria-hidden="true">search</span>
        <input id="globalSearch" placeholder="Поиск модов…" spellcheck="false">
        <button id="clearSearch" class="tb-search-clear hidden" aria-label="Очистить"><span class="ms">close</span></button>
      </div>

      <div class="tb-controls">
        <button class="tb-ctl" id="winMin" aria-label="Свернуть"><svg viewBox="0 0 12 12" width="12" height="12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.2"/></svg></button>
        <button class="tb-ctl tb-close" id="winClose" aria-label="Закрыть"><svg viewBox="0 0 12 12" width="12" height="12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></button>
      </div>
    </header>

    <!-- Body -->
    <div id="body">
      <div class="body-main">
        <!-- Category rail (catalog view only) -->
        <aside id="catRail" class="cat-rail"></aside>

        <main id="main">
          <div id="view-root"></div>
        </main>
      </div>

      <aside class="side-panel">
        <div class="side-brand">
          <div class="side-brand-title">Dota2skins</div>
        </div>
        <div class="side-nav">
          <button class="tb-tab side-tab active" data-view="catalog">Каталог</button>
          <button class="tb-tab side-tab" data-view="library">Библиотека<span class="tb-badge" id="libCount"></span></button>
          <button class="tb-tab side-tab" data-view="presets">Пресеты</button>
          <button class="tb-tab side-tab" data-view="authors">Авторы</button>
          <button class="tb-tab side-tab" data-view="tools">Инструменты</button>
          <button class="tb-tab side-tab" data-view="settings">Настройки</button>
        </div>
        <button class="side-launch" id="launchDotaBtn"><span class="ms">play_arrow</span><span>Запустить Dota 2</span></button>
      </aside>
    </div>

    <!-- Status footer strip -->
    <footer id="statusbar">
      <span class="dot" id="dotaStatusDot"></span>
      <span id="dotaStatusText">Поиск Dota 2…</span>
      <button class="status-link" id="openModsFolderBtn">Открыть папку модов</button>
    </footer>

    <!-- Progress bar (bottom) -->
    <div id="progressBar" class="progress-bar hidden">
      <div class="progress-info">
        <span id="progressLabel"></span>
        <span id="progressSize"></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- Toasts -->
    <div id="toasts"></div>

    <!-- Modal -->
    <div id="modalOverlay" class="modal-overlay hidden">
      <div id="modalContent" class="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
